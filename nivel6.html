<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nível 6 - ICE</title>
<link rel="stylesheet" href="style.css">

<style>
.row{
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
}
.row select{
  flex:1;
  min-width:120px;
}
</style>

</head>

<body>
<div class="section hero">
<header>
<h2>🧠 Painel para Frases - ICE</h2>
<p>By Teacher Evan</p>

</div>
<a href="index.html" class="back">⬅ Voltar</a>
</header>

<div class="card">
  <h3>🧠 Nível 6 — Dois objetos com transformação</h3>
  <p><b>S + V + O1(pronome) + O2</b></p>
</div>

<div class="card">

<!-- SUJEITO -->
<div class="group">
  <label>👤 Sujeito</label>
  <div class="row">
    <select id="detS"></select>
    <select id="adjS"></select>
    <select id="nounS"></select>
  </div>
</div>

<!-- VERBO -->
<div class="group">
  <label>🔴 Verbo (2 objetos)</label>
  <select id="v"></select>
</div>

<!-- OBJETO 1 -->
<div class="group">
  <label>🔵 Objeto 1 (pronome)</label>
  <select id="o1"></select>
</div>

<!-- OBJETO 2 -->
<div class="group">
  <label>🔵 Objeto 2</label>
  <div class="row">
    <select id="detO2"></select>
    <select id="adjO2"></select>
    <select id="nounO2"></select>
  </div>
</div>

<button onclick="build()">✍️ Formular Frase</button>

<div class="result" id="result"></div>

<!-- SUBSTITUIÇÃO -->
<div id="replaceArea" style="display:none; margin-top:20px;">

<div class="group">
  <label>🔁 Substituir objeto 1</label>
  <div class="row">
    <select id="repDetO1"></select>
    <select id="repAdjO1"></select>
    <select id="repNounO1"></select>
  </div>
</div>

<div class="group">
  <label>🔁 Substituir objeto 2</label>
  <div class="row">
    <select id="repDetO2"></select>
    <select id="repAdjO2"></select>
    <select id="repNounO2"></select>
  </div>
</div>

<button onclick="applyReplace()">🔄 Aplicar</button>

</div>

</div>

  <div class="hero-image">
    <img src="header.png" alt="ICE Banner">
  </div>


<script src="data.js"></script>
<script>

// ===== UTIL
function clean(v){
  return v.split(" (")[0];
}

function fill(id, list){
  let el = document.getElementById(id);
  el.innerHTML = '<option value="">none</option>';
  list.forEach(item=>{
    el.innerHTML += `<option value="${clean(item.v)}">${item.v}</option>`;
  });
}

// ===== BUILD NP (nível 4 padrão)
function buildNP(det, adj, noun){

  if(!noun) return "";

  const item =
    GLOBAL.content_words.nouns.find(n => clean(n.v) === noun) ||
    GLOBAL.content_words.nuclei.find(n => clean(n.v) === noun);

  if(!det){
    if(item && (item.tags.includes("plural") || item.tags.includes("uncountable"))){
      return [adj, noun].filter(Boolean).join(" ");
    }
    det = "the";
  }

  return [det, adj, noun].filter(Boolean).join(" ");
}

// ===== BANCO
const dets = GLOBAL.function_words.determiners;
const adjs = GLOBAL.content_words.adjectives;

const nouns = [
  ...GLOBAL.content_words.nouns,
  ...GLOBAL.content_words.nuclei
];

const verbs = GLOBAL.content_words.verbs;

const objectPronouns =
  GLOBAL.function_words.pronouns.filter(p => p.tags.includes("pron_obj"));

const verb2obj =
  verbs.filter(v => v.tags.includes("verb_2obj"));

// ===== LOAD
["detS","detO2"].forEach(id=>fill(id,dets));
["adjS","adjO2"].forEach(id=>fill(id,adjs));
["nounS","nounO2"].forEach(id=>fill(id,nouns));

fill("v", verb2obj);
fill("o1", objectPronouns);

// substituição
["repDetO1","repDetO2"].forEach(id=>fill(id,dets));
["repAdjO1","repAdjO2"].forEach(id=>fill(id,adjs));
["repNounO1","repNounO2"].forEach(id=>fill(id,nouns));

let current = {};

// ===== BUILD
function build(){

  current = {
    detS:detS.value,
    adjS:adjS.value,
    nounS:nounS.value,
    v:v.value,
    o1:o1.value,
    detO2:detO2.value,
    adjO2:adjO2.value,
    nounO2:nounO2.value
  };

  render();
  replaceArea.style.display="block";
}

// ===== APPLY REPLACE
function applyReplace(){

  let s = buildNP(current.detS, current.adjS, current.nounS);

  let o1 = current.o1;
  let o2 = buildNP(current.detO2, current.adjO2, current.nounO2);

  // O1 vira NP completo
  if(repNounO1.value){
    o1 = buildNP(repDetO1.value, repAdjO1.value, repNounO1.value);
  }

  // O2 completo
  if(repNounO2.value){
    o2 = buildNP(repDetO2.value, repAdjO2.value, repNounO2.value);
  }

  render(s,o1,o2);
}

// ===== RENDER
function render(sC=null,o1C=null,o2C=null){

  let s = sC || buildNP(current.detS, current.adjS, current.nounS);
  let o1 = o1C || current.o1;
  let o2 = o2C || buildNP(current.detO2, current.adjO2, current.nounO2);

  document.getElementById("result").innerHTML = `
    <span class="blue">${s}</span>
    <span class="verb">${current.v}</span>
    <span class="blue">${o1}</span>
    <span class="blue">${o2}</span>
  `;
}

</script>

</body>
</html>
