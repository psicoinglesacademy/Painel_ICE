<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nível 1 - ICE</title>
<link rel="stylesheet" href="style.css">

<style>
.row{
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
}
.row select{
  flex:1;
  min-width:120px;
}
</style>

</head>

<body>
<div class="section hero">
<header>
<h2>🧠 Painel para Frases - ICE</h2>
<p>By Teacher Evan</p>

</div>

<a href="index.html" class="back">⬅ Voltar</a>
</header>
</div>
<div class="card">
  <h3>🧩 Nível 1 — Estrutura básica</h3>
  <p>Sujeito + Verbo + Objeto</p>
</div>

<div class="card">

<label>👤 Sujeito</label>
<select id="s1"></select>

<label>🔴 Verbo</label>
<select id="v1"></select>

<label>🔵 Objeto</label>
<select id="o1"></select>

<button onclick="build()">✍️ Formular Frase</button>

<h3>🧩 Veja sua frase ✨</h3>

<div class="result" id="result"></div>

<div id="replaceArea" style="display:none; margin-top:20px;">

<!-- SUJEITO -->
<div class="group">
<label>🔁 Substituir sujeito</label>
<div class="row">
<select id="detRS"></select>
<select id="adjRS"></select>
<select id="nounRS"></select>
</div>
</div>

<!-- OBJETO -->
<div class="group">
<label>🔁 Substituir objeto</label>
<div class="row">
<select id="detRO"></select>
<select id="adjRO"></select>
<select id="nounRO"></select>
</div>
</div>

<button onclick="applyReplace()">🔄 Aplicar Substituição</button>

</div>
</div>

<!-- ===== IA CORRETORA ===== -->
<div class="card">

  <h3>🤖 Correção com IA</h3>
  <p>Formule sua frase acima. Depois envie para correção.</p>

  <iframe 
    src="https://app.edcafe.ai/chatbots/69efe14b4eb81875b9dad001"
    title="Correção ICE"
    allow="microphone"
    style="border:none; width:100%; height:600px;">
  </iframe>

</div>

  <div class="hero-image">
    <img src="header.png" alt="ICE Banner">
  </div>

<script src="data.js"></script>
<script>

// ===== UTIL =====
function clean(v){
  return v.split(" (")[0];
}

function fill(id, list){
  let el = document.getElementById(id);
  el.innerHTML = '<option value="">none</option>';

  // 🔥 ORDENA ALFABETICAMENTE
  const sorted = [...list].sort((a, b) => {
    return clean(a.v).localeCompare(clean(b.v));
  });

  sorted.forEach(item=>{
    el.innerHTML += `<option value="${clean(item.v)}">${item.v}</option>`;
  });
}

// ===== BUILD NP (CORREÇÃO PRINCIPAL) =====
function buildNP(det, adj, noun){
  if(!noun) return "";
  if(!det) det = "the";
  return [det, adj, noun].filter(Boolean).join(" ");
}

// ===== FILTRO SEMÂNTICO =====
// ===== FILTRO SEMÂNTICO N1 =====
function filterSmart(nucleus){

  const base = GLOBAL.content_words.nuclei.find(n => clean(n.v) === nucleus);
  if(!base) return [];

  const core = base.tags[0];
  const number = base.tags.includes("plural") ? "plural" : "singular";

  return nounsN1.filter(n =>
    n.tags.includes(core) && n.tags.includes(number)
  );
}

// ===== MAPA SEMÂNTICO =====
const semanticMap = {
  "he":"man",
  "she":"woman",
  "it":"thing",
  "they":"people"
};

// ===== BANCO =====
// ===== BANCO N1 (COMPLETO) =====
const subjects = GLOBAL.function_words.pronouns.filter(p => 
  p.tags.includes("pron_subj") && p.tags.includes("n1")
);

const verbs = GLOBAL.content_words.verbs.filter(v => {

  const word = v.v.toLowerCase().trim();

  return (
    v.tags.includes("verb_obj") &&
    v.tags.includes("n1") &&

    !v.tags.includes("verb_inf") &&
    !word.startsWith("to ") &&

    !v.tags.includes("verb_ing") &&
    !v.tags.includes("verb_ing_form") &&
    !word.endsWith("ing") &&

    !v.tags.includes("verb_prep") &&
    !v.tags.includes("verb_modal") &&
    !v.tags.includes("verb_link") &&
    !v.tags.includes("verb_2obj")
  );
});

const objects = GLOBAL.function_words.pronouns.filter(p => 
  p.tags.includes("pron_obj") && p.tags.includes("n1")
);

const dets = GLOBAL.function_words.determiners.filter(d => 
  d.tags.includes("n1")
);

const adjs = GLOBAL.content_words.adjectives.filter(a => 
  a.tags.includes("n1")
);

const nuclei = GLOBAL.content_words.nuclei.filter(n => 
  n.tags.includes("n1")
);

// 🔥 NOVO — N1 nouns centralizado
const nounsN1 = GLOBAL.content_words.nouns.filter(n => 
  n.tags.includes("n1")
);

const nounOptionsN1 = [
  ...nuclei,
  ...nounsN1.filter(n => 
    !nuclei.some(k => clean(k.v) === clean(n.v))
  )
];

// ===== LOAD =====
fill("s1", subjects);
fill("v1", verbs);
fill("o1", objects);

["detRS","detRO"].forEach(id=>fill(id,dets));
["adjRS","adjRO"].forEach(id=>fill(id,adjs));
["nounRS","nounRO"].forEach(id=>fill(id,nuclei));

let current = {};

// ===== BUILD =====
function build(){

  let s = s1.value;
  let v = v1.value;
  let o = o1.value;

  if(!s || !v){
    result.innerHTML = "<span style='color:red'>Selecione sujeito e verbo</span>";
    return;
  }

  current = {s,v,o};

  result.innerHTML = `
    <span class="blue">${s}</span>
    <span class="verb">${v}</span>
    ${o ? `<span class="blue">${o}</span>` : ""}
  `;

  updateReplace();
  replaceArea.style.display="block";
}

// ===== UPDATE REPLACE =====
// ===== UPDATE REPLACE (N1 PURO) =====
function updateReplace(){

  // 🔥 SEM FILTRO — MOSTRA TUDO DO N1 (nouns + nuclei)

  fill("nounRS", nounOptionsN1);
  fill("nounRO", nounOptionsN1);

}

// ===== APPLY =====
function applyReplace(){

  let newSubject = current.s;
  let newObject = current.o;

  if(nounRS.value){
    newSubject = buildNP(detRS.value, adjRS.value, nounRS.value);
  }

  if(nounRO.value){
    newObject = buildNP(detRO.value, adjRO.value, nounRO.value);
  }

  result.innerHTML = `
    <span class="blue">${newSubject}</span>
    <span class="verb">${current.v}</span>
    ${newObject ? `<span class="blue">${newObject}</span>` : ""}
  `;
}

</script>

</body>
</html>
